<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Server Monitoring Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {

            background: #0f172a;

            color: white;

            font-family: Arial, sans-serif;

            text-align: center;

            padding: 20px;

        }

        h1 {

            color: cyan;

            margin-bottom: 40px;

        }

        .container {

            display: flex;

            justify-content: center;

            gap: 30px;

            flex-wrap: wrap;

        }

        .card {

            background: #1e293b;

            padding: 25px;

            border-radius: 15px;

            width: 250px;

            box-shadow: 0px 0px 15px cyan;

        }

        .value {

            font-size: 40px;

            color: cyan;

        }

        canvas {

            margin-top: 50px;

            background: white;

            border-radius: 10px;

            padding: 20px;

        }

    </style>

</head>

<body>

    <h1>Server Monitoring Dashboard</h1>

    <div class="container">

        <div class="card">

            <h2>CPU Usage</h2>

            <div class="value" id="cpu">0%</div>

        </div>

        <div class="card">

            <h2>Memory Usage</h2>

            <div class="value" id="memory">0%</div>

        </div>

        <div class="card">

            <h2>Disk Usage</h2>

            <div class="value" id="disk">0%</div>

        </div>

    </div>

    <canvas id="myChart" width="400" height="150"></canvas>

    <script>

        const ctx = document.getElementById('myChart');

        const myChart = new Chart(ctx, {

            type: 'bar',

            data: {

                labels: ['CPU', 'Memory', 'Disk'],

                datasets: [{

                    label: 'System Usage %',

                    data: [0, 0, 0],

                    borderWidth: 1

                }]

            },

            options: {

                scales: {

                    y: {

                        beginAtZero: true,

                        max: 100

                    }

                }

            }

        });

        async function fetchStats() {

            const response = await fetch('/stats/');

            const data = await response.json();

            document.getElementById('cpu').innerText = data["CPU Usage"] + "%";

            document.getElementById('memory').innerText = data["Memory Usage"] + "%";

            document.getElementById('disk').innerText = data["Disk Usage"] + "%";

            myChart.data.datasets[0].data = [

                data["CPU Usage"],

                data["Memory Usage"],

                data["Disk Usage"]

            ];

            myChart.update();

        }

        fetchStats();

        setInterval(fetchStats, 2000);

    </script>

</body>

</html>
